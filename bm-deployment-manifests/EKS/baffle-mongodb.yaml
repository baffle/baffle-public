apiVersion: v1
kind: Secret
metadata:  
  name: baffle-mongodb-secret
type: Opaque
data:
  baffle-mongodb-username: YmFmZmxlX2FkbWluCg==
  baffle-mongodb-password: YmFmZmxlX3Bhc3NfMDk4NzYK

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: baffle-mongodb
  labels:
    app: baffle-mongodb
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: baffle-mongodb
  template:
    metadata:
      labels:
        app: baffle-mongodb
    spec:
      volumes:
        - name: baffle-mongodb-volume
          persistentVolumeClaim:
            claimName: baffle-mongodb-pvc
        - name: baffle-mongodb-secret
          secret:
            secretName: baffle-mongodb-secret
      containers:
      - name: baffle-mongodb
        image: 902018721894.dkr.ecr.us-west-2.amazonaws.com/baffle-hub:baffle-mongodb-v2
        volumeMounts:
        - name: baffle-mongodb-volume
          mountPath: /data/db
        - name: baffle-mongodb-secret
          mountPath: /run/secrets/mongodb_user
          subPath: baffle-mongodb-username
        - name: baffle-mongodb-secret
          mountPath: /run/secrets/mongodb_pass
          subPath: baffle-mongodb-password
        env:
        - name: MONGO_INITDB_ROOT_USERNAME_FILE
          value: /run/secrets/mongodb_user
        - name: MONGO_INITDB_ROOT_PASSWORD_FILE
          value: /run/secrets/mongodb_pass
        - name: MONGO_INITDB_DATABASE
          value: admin 
      imagePullSecrets:
      - name: ecrcredentials

---

apiVersion: v1
kind: Service
metadata:
  labels:
    app: baffle-mongodb
  name: baffle-mongodb
spec:
  ports:
  - port: 27017
    protocol: TCP
    targetPort: 27017
  selector:
    app: baffle-mongodb
  type: ClusterIP
